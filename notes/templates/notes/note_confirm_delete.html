{% extends "notes/base.html" %}

{% block content %}
<div class="card border-0 shadow-sm">
    <div class="card-body p-4 text-center">
        <i class="bi bi-exclamation-triangle text-warning" style="font-size:3rem"></i>
        <h4 class="mt-3">Delete "{{ note.title }}"?</h4>
        <p class="text-muted">This note will be moved to trash.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger me-2">Move to Trash</button>
            <a href="{% url 'note_detail' note.pk %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
